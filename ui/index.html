<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Omni-Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<!-- KaTeX for inline ($…$) and block ($$…$$) math, wired into marked below. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5/lib/index.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #262b36; --text: #e6e9ef;
    --muted: #8b93a7; --accent: #5b9dff; --ok: #3fb950; --run: #d29922;
    --fail: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, system-ui, sans-serif;
    display: grid; grid-template-columns: 240px 1fr; height: 100vh;
  }
  /* Sidebar */
  aside {
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    min-height: 0;
  }
  aside .top { padding: 12px; border-bottom: 1px solid var(--border); }
  aside h1 { font-size: 14px; margin: 0 0 10px; }
  #new { width: 100%; }
  #sessions { overflow-y: auto; flex: 1; padding: 6px; }
  /* Files tree */
  .files-empty { color: var(--muted); font-size: 12px; padding: 6px; }
  .ftree-group { margin-bottom: 2px; }
  .ftree-label { cursor: pointer; user-select: none; font-size: 12px;
    color: var(--text); display: flex; align-items: center; gap: 6px;
    padding: 3px 4px; border-radius: 6px; }
  .ftree-label:hover { background: #1e222b; }
  .ftree-label .caret { transition: transform .15s; font-size: 9px;
    color: var(--muted); display: inline-block; }
  .ftree-group.closed .caret { transform: rotate(-90deg); }
  .ftree-group.closed .ftree-children { display: none; }
  .ftree-count { color: var(--muted); font-size: 10px; margin-left: auto; }
  .ftree-children { padding-left: 10px; }
  .ftree-file { display: flex; align-items: center; gap: 6px; font-size: 12px;
    color: var(--muted); padding: 2px 4px 2px 8px; margin-left: 5px;
    border-left: 1px solid var(--border); }
  .ftree-file:hover { color: var(--text); }
  .ftree-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; }
  .ftree-dl { flex-shrink: 0; text-decoration: none; color: var(--accent);
    opacity: 0; font-size: 13px; }
  .ftree-file:hover .ftree-dl { opacity: 1; }
  /* Right-panel tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 10px;
    border-bottom: 1px solid var(--border); }
  .tab { background: transparent; border: 0; border-bottom: 2px solid transparent;
    border-radius: 0; color: var(--muted); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em; padding: 6px 10px; cursor: pointer; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tabview[hidden] { display: none; }
  .sess {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 10px; border-radius: 8px; font-size: 13px; color: var(--text);
  }
  .sess:hover { background: #1e222b; }
  .sess.active { background: #232a37; }
  .sess-main {
    flex: 1; min-width: 0; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sess small { display: block; color: var(--muted); font-size: 11px; }
  .sess-del {
    background: transparent; border: 0; padding: 2px 4px; font-size: 13px;
    cursor: pointer; opacity: 0; flex-shrink: 0; border-radius: 6px;
  }
  .sess:hover .sess-del { opacity: .6; }
  .sess-del:hover { opacity: 1; background: rgba(248,81,73,.15); }
  /* Main */
  main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  header { padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .hdr-title { color: var(--muted); font-size: 12px; }
  .modelbar { display: flex; gap: 10px; align-items: center; }
  .modelbar label { color: var(--muted); font-size: 11px; text-transform: uppercase;
    letter-spacing: .04em; display: flex; align-items: center; gap: 5px; }
  .modelbar select { background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 7px; padding: 5px 8px;
    font-size: 12px; text-transform: none; letter-spacing: normal; }
  .modelbar .mini { background: #2a2f3a; color: var(--text);
    border: 1px solid var(--border); border-radius: 7px; padding: 5px 9px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    text-transform: none; letter-spacing: normal; }
  .modelbar .mini:hover { background: #333a48; }
  .cols { display: grid; grid-template-columns: 1fr 380px; gap: 14px;
    padding: 14px 16px; overflow: hidden; flex: 1; min-height: 0; }
  @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; overflow-y: auto; min-height: 0; }
  .panel h2 { margin: 0 0 10px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .05em; color: var(--muted); }
  /* Conversation */
  .bubble { border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
    white-space: pre-wrap; }
  .bubble.user { background: #1d2634; border: 1px solid #2b3346; }
  .bubble.assistant { background: #14171d; border: 1px solid var(--border); }
  .bubble .who { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stats { color: var(--muted); font-size: 12px; margin-top: 4px; }
  /* Plan */
  .turn-group { margin-bottom: 14px; }
  .turn-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--accent); font-weight: 600; margin: 4px 0 6px; padding-bottom: 3px;
    border-bottom: 1px solid var(--border); }
  .step { border: 1px solid var(--border); border-radius: 8px; padding: 8px;
    margin-bottom: 8px; }
  .step .head { display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: #2a2f3a; color: var(--muted); }
  .badge.running { background: rgba(210,153,34,.15); color: var(--run); }
  .badge.done { background: rgba(63,185,80,.15); color: var(--ok); }
  .badge.failed, .badge.replaced { background: rgba(248,81,73,.12); color: var(--fail); }
  .step .deps { color: var(--muted); font-size: 11px; }
  .step .result { margin-top: 6px; color: var(--muted); font-size: 12px;
    white-space: pre-wrap; max-height: 240px; overflow-y: auto; }
  /* Collapsible section headers */
  .toggle { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
  .toggle .caret { transition: transform .15s; display: inline-block; }
  .toggle.closed .caret { transform: rotate(-90deg); }
  .collapsed { display: none !important; }
  /* Markdown-rendered assistant answers */
  .md { white-space: normal; }
  .md > :first-child { margin-top: 0; }
  .md > :last-child { margin-bottom: 0; }
  .md h1, .md h2, .md h3, .md h4 { margin: .7em 0 .35em; line-height: 1.25;
    color: var(--text); text-transform: none; letter-spacing: normal; }
  .md h1 { font-size: 1.4em; } .md h2 { font-size: 1.2em; }
  .md h3 { font-size: 1.05em; } .md h4 { font-size: 1em; }
  .md p { margin: .5em 0; }
  .md ul, .md ol { margin: .4em 0; padding-left: 1.4em; }
  .md li { margin: .2em 0; }
  .md code { background: #0d1117; border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 5px; font-size: .9em; color: #e6c07b; }
  .md pre { background: #0d1117; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; overflow-x: auto; }
  .md pre code { background: none; border: 0; padding: 0; color: var(--text); }
  .md table { border-collapse: collapse; margin: .6em 0; width: 100%; font-size: .92em; }
  .md th, .md td { border: 1px solid var(--border); padding: 6px 9px; text-align: left; }
  .md th { background: #1c212b; }
  .md blockquote { border-left: 3px solid var(--border); margin: .5em 0;
    padding: .2em .8em; color: var(--muted); }
  .md a { color: var(--accent); }
  .md img { max-width: 100%; }
  .md .mermaid { background: #0d1117; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; margin: .6em 0; text-align: center; }
  .md hr { border: 0; border-top: 1px solid var(--border); margin: .8em 0; }
  .md del { color: var(--muted); }
  /* GFM task lists (checkboxes) — marked emits a bare <li> with a checkbox */
  .md li:has(> input[type="checkbox"]) { list-style: none; margin-left: -1.2em; }
  .md li > input[type="checkbox"] { margin: 0 .5em 0 0; vertical-align: middle;
    accent-color: var(--accent); }
  /* Collapsible <details> sections */
  .md details { border: 1px solid var(--border); border-radius: 8px;
    padding: .3em .8em; margin: .6em 0; background: #12151c; }
  .md details[open] { padding-bottom: .6em; }
  .md summary { cursor: pointer; user-select: none; font-weight: 600; padding: .2em 0; }
  .md summary::marker { color: var(--muted); }
  /* KaTeX block math: center and let long expressions scroll instead of clipping */
  .md .katex-display { margin: .6em 0; overflow-x: auto; overflow-y: hidden; padding: 2px 0; }
  .md .katex { font-size: 1.02em; }
  .tool { font-size: 12px; color: var(--muted); margin: 3px 0 0 4px;
    white-space: pre-wrap; overflow-wrap: anywhere; }
  .tool code { color: var(--accent); }
  /* Nested child sub-agents (spawn_subagents fan-out) under a plan step. */
  .subagent { border-left: 2px solid var(--border); margin: 5px 0 0 6px; padding: 3px 0 3px 8px; }
  .subagent .sa-head { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .subagent .sa-title { color: var(--fg); }
  .subagent .sa-result { color: var(--muted); font-size: 12px; margin-top: 3px; white-space: pre-wrap; }
  .subagent .badge { font-size: 10px; padding: 1px 6px; }
  #log { font-size: 12px; color: var(--muted); margin-top: 10px; }
  #log div { padding: 2px 0; border-bottom: 1px solid var(--border);
    white-space: pre-wrap; overflow-wrap: anywhere; }
  /* Composer */
  .bar { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border);
    align-items: flex-end; }
  .bar textarea {
    flex: 1; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 14px;
    font-family: inherit; line-height: 1.4; resize: none; overflow-y: auto;
    max-height: 200px; min-height: 42px;
  }
  button { background: var(--accent); color: #fff; border: 0; padding: 10px 16px;
    border-radius: 8px; cursor: pointer; font-weight: 600; }
  button.secondary { background: #2a2f3a; }
  button:disabled { opacity: .5; cursor: default; }
  .attach { display: flex; align-items: center; justify-content: center;
    width: 40px; min-height: 42px; border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: 18px; user-select: none; background: var(--panel); }
  .attach:hover { background: #1e222b; }
  .attach.busy { opacity: .5; pointer-events: none; }
</style>
</head>
<body>
<aside>
  <div class="top">
    <h1>Omni-Agent</h1>
    <button id="new">＋ New chat</button>
  </div>
  <div id="sessions"></div>
</aside>

<main>
  <header>
    <span class="hdr-title">Session <span id="status">— none —</span></span>
    <span class="modelbar">
      <label>Model <select id="model" title="Model for this session"></select></label>
      <label>Thinking <select id="thinking" title="Reasoning depth"></select></label>
      <button id="exportMd" class="mini" title="Export conversation (request + response) as Markdown">↓ Chats</button>
      <button id="exportFull" class="mini" title="Export full run — request, steps, activity, then response">↓ All</button>
    </span>
  </header>
  <div class="cols">
    <section class="panel" id="convo"><h2>Conversation</h2><div id="thread"></div></section>
    <section class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="plan">Plan</button>
        <button class="tab" data-tab="log">Activity</button>
        <button class="tab" data-tab="files">Files</button>
      </div>
      <div id="plan" class="tabview"></div>
      <div id="log" class="tabview" hidden></div>
      <div id="files" class="tabview" hidden><div class="files-empty">Open a chat to see its files</div></div>
    </section>
  </div>
  <div class="bar">
    <label class="attach" id="attach" title="Attach files or images (PDF, DOCX, TXT, PNG…)">📎
      <input id="file" type="file" multiple hidden
        accept=".pdf,.docx,.doc,.txt,.md,.csv,.json,.html,image/*" />
    </label>
    <textarea id="q" rows="1"
      placeholder="Ask a research question, or attach a file and ask about it…  (Enter to send, Shift+Enter for a new line)"></textarea>
    <button id="run">Send</button>
    <button id="stop" class="secondary" disabled>Stop</button>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const steps = {};        // "turn:step" -> {el, badge, result}
const turnGroups = {};   // turn -> group container element
let sessionId = null;
let streamBubble = null;  // live assistant bubble being streamed into
let modelDefaults = { default_model: null, default_thinking_level: null };
const sessionsById = {};  // id -> session record (for model/thinking sync)

// Populate the model + thinking dropdowns from the backend catalogue.
async function loadModelOptions() {
  try {
    const data = (await (await fetch("/sessions/options/models")).json()).data;
    modelDefaults = data;
    $("model").innerHTML = data.models
      .map((m) => {
        const ctx = m.context_window_tokens
          ? ` · ${Math.round(m.context_window_tokens / 1000)}k ctx` : "";
        return `<option value="${m.id}">${m.label}${ctx}</option>`;
      }).join("");
    $("thinking").innerHTML = data.thinking_levels
      .map((t) => `<option value="${t}">${t}</option>`).join("");
    $("model").value = data.default_model;
    $("thinking").value = data.default_thinking_level;
  } catch (e) { /* backend not ready; dropdowns stay empty */ }
}

function currentChoice() {
  return { model: $("model").value || undefined,
           thinking_level: $("thinking").value || undefined };
}
function syncChoice(sess) {
  if (sess && sess.model) $("model").value = sess.model;
  if (sess && sess.thinking_level) $("thinking").value = sess.thinking_level;
}

function setStatus(t) { $("status").textContent = t; }
function log(msg) {
  const d = document.createElement("div"); d.textContent = msg;
  $("log").prepend(d);
}
// 1234 → "1.2k"; keeps small counts exact.
function fmtTokens(n) {
  n = n || 0;
  return n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + "k" : String(n);
}
// Seconds → "1m 05s" / "42.3s".
function fmtDuration(sec) {
  if (sec == null) return "—";
  if (sec < 60) return `${sec.toFixed(1)}s`;
  const m = Math.floor(sec / 60), s = Math.round(sec % 60);
  return `${m}m ${String(s).padStart(2, "0")}s`;
}
// Backend timestamps are UTC but serialized without a tz suffix; treat a bare
// (naive) timestamp as UTC so the browser renders it in the user's local time.
function fmtDateTime(ts) {
  if (!ts) return "";
  let s = String(ts);
  if (!/[zZ]|[+-]\d{2}:?\d{2}$/.test(s)) s = s.replace(" ", "T") + "Z";
  const d = new Date(s);
  return isNaN(d) ? String(ts) : d.toLocaleString();
}
function scrollThread() { $("convo").scrollTop = $("convo").scrollHeight; }

// ---- Files tree (left sidebar) ----
// Artifacts grouped by kind into a collapsible tree for the open session.
const FILE_KINDS = [
  { key: "upload", label: "📎 Uploads" },
  { key: "download", label: "⬇ Downloads" },
  { key: "parsed", label: "📄 Parsed" },
];
function renderFiles(arts, sid) {
  const box = $("files");
  box.innerHTML = "";
  if (!arts || !arts.length) {
    box.innerHTML = `<div class="files-empty">No files in this chat yet</div>`;
    return;
  }
  const byKind = {};
  for (const a of arts) (byKind[a.kind] = byKind[a.kind] || []).push(a);
  // Known kinds first (in order), then any others we don't recognise.
  const order = FILE_KINDS.slice();
  for (const k of Object.keys(byKind)) {
    if (!order.some((o) => o.key === k)) order.push({ key: k, label: `📁 ${k}` });
  }
  for (const { key, label } of order) {
    const items = byKind[key];
    if (!items || !items.length) continue;
    const group = document.createElement("div");
    group.className = "ftree-group";
    const head = document.createElement("div");
    head.className = "ftree-label";
    head.innerHTML = `<span class="caret">▾</span><span>${label}</span><span class="ftree-count">${items.length}</span>`;
    head.onclick = () => group.classList.toggle("closed");
    const children = document.createElement("div");
    children.className = "ftree-children";
    for (const a of items) {
      const leaf = document.createElement("div");
      leaf.className = "ftree-file";
      leaf.title = a.summary ? `${a.name} — ${a.summary}` : a.name;
      const name = document.createElement("span");
      name.className = "ftree-name";
      name.textContent = a.name;
      const dl = document.createElement("a");
      dl.className = "ftree-dl";
      dl.href = `/sessions/${sid}/artifacts/${a.id}/content`;
      dl.setAttribute("download", a.name);
      dl.title = "Download";
      dl.textContent = "⤓";
      leaf.append(name, dl);
      children.appendChild(leaf);
    }
    group.appendChild(head);
    group.appendChild(children);
    box.appendChild(group);
  }
}
async function loadFiles(id) {
  if (!id) { renderFiles([], null); return; }
  const arts = (await (await fetch(`/sessions/${id}/artifacts`)).json()).data;
  renderFiles(arts, id);
}

// Render a persisted/streamed event as a one-line activity string.
function eventLine(type, d) {
  d = d || {};
  switch (type) {
    case "plan_created": return `${d.revised ? "↻ revised plan" : "🧩 plan"} — ${(d.steps || []).length} step(s)`;
    case "node_started": return `▶ step ${d.step_number} started: ${d.title || ""}`;
    case "tool": {
      const who = d.child_title ? ` (🤖 ${d.child_title})` : "";
      return `⚙ step ${d.step_number}${who}: ${d.tool} → ${d.result_summary || ""}`;
    }
    case "node_completed": return `✔ step ${d.step_number} ${d.status}`;
    case "reflection": return `🔎 step ${d.step_number} self-review: ${d.sufficient ? "sufficient" : "gathering more"} — ${d.reason || ""}`;
    case "subagents_spawned": return `🧬 step ${d.step_number}: spawned ${d.count} parallel sub-agent(s)`;
    case "subagent_started": return `  🤖 step ${d.step_number}: sub-agent "${d.child_title || d.child_index}" started`;
    case "subagent_completed": return `  🤖 step ${d.step_number}: sub-agent "${d.child_title || d.child_index}" ${d.status}`;
    case "evaluator": {
      const parts = [];
      if ((d.added || []).length) parts.push(`+${d.added.length}`);
      if ((d.removed || []).length) parts.push(`-${d.removed.length}`);
      if ((d.repointed || []).length) parts.push(`↺${d.repointed.length}`);
      const delta = parts.length ? ` [${parts.join(" ")}]` : "";
      return `↻ evaluator: ${d.done ? "done" : "needs more"}${delta} — ${d.reason || ""}`;
    }
    case "stopped": return `⏹ ${d.reason || "stopped"}`;
    case "budget_exceeded": return `💰 ${d.reason || "budget reached"}`;
    case "no_progress": return `⚠ ${d.reason || "no progress"}`;
    case "answer_part": return `✍ answer continued — part ${d.part}`;
    case "error": return `❌ ${d.message || "error"}`;
    default: return type;
  }
}

if (window.marked) {
  marked.setOptions({ gfm: true, breaks: true });
  // Inline `$…$` and block `$$…$$` math → KaTeX (handled during parse so
  // markdown doesn't mangle underscores/backslashes in formulas). Standard
  // delimiter rules (not nonStandard) so plain "$5 and $10" isn't read as math.
  if (window.markedKatex) {
    marked.use(window.markedKatex({ throwOnError: false }));
  }
}
if (window.mermaid) mermaid.initialize({ startOnLoad: false, theme: "dark", securityLevel: "loose" });

// Keep the tags/attrs that GFM + KaTeX emit but DOMPurify might otherwise drop:
// <details>/<summary> (collapsibles), task-list <input> checkboxes, and the
// MathML/aria markup KaTeX outputs alongside its HTML.
const _SANITIZE = {
  ADD_TAGS: ["details", "summary"],
  ADD_ATTR: ["open", "type", "checked", "disabled"],
  USE_PROFILES: { html: true, svg: true, mathMl: true },
};

// Render markdown (sanitized) into an element; falls back to plain text.
function renderMarkdown(el, raw) {
  if (window.marked) {
    let html = marked.parse(raw || "");
    if (window.DOMPurify) html = DOMPurify.sanitize(html, _SANITIZE);
    el.innerHTML = html;
    el.classList.add("md");
    // Mop up math the marked extension can't reach: inside raw-HTML blocks like
    // <details>, marked emits the content verbatim so `$…$` never gets parsed.
    // Scope this to <details> only — prose math is already handled above, and
    // running it there would misread currency ("$5 and $10") as math.
    if (window.renderMathInElement) {
      el.querySelectorAll("details").forEach((d) => {
        try {
          renderMathInElement(d, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
            ],
            throwOnError: false,
          });
        } catch (e) { /* leave source visible */ }
      });
    }
  } else {
    el.textContent = raw || "";
  }
}

// Turn ```mermaid code blocks into rendered diagrams (call once, on completion).
let _mermaidSeq = 0;
async function renderMermaid(el) {
  if (!window.mermaid) return;
  const blocks = el.querySelectorAll("code.language-mermaid");
  for (const code of blocks) {
    const div = document.createElement("div");
    div.className = "mermaid";
    div.textContent = code.textContent;
    (code.closest("pre") || code).replaceWith(div);
  }
  const nodes = el.querySelectorAll(".mermaid:not([data-processed])");
  if (nodes.length) {
    try { await mermaid.run({ nodes }); } catch (e) { /* leave source visible */ }
  }
}

function bubbleBody(b) { return b.querySelector(".body"); }

function addBubble(who, text, cls, asMarkdown) {
  const b = document.createElement("div");
  b.className = "bubble " + cls;
  const head = document.createElement("div");
  head.className = "who"; head.textContent = who;
  const body = document.createElement("div");
  body.className = "body";
  if (asMarkdown) { renderMarkdown(body, text); renderMermaid(body); }
  else body.textContent = text;
  b.appendChild(head); b.appendChild(body);
  $("thread").appendChild(b);
  scrollThread();
  return b;
}

// ---- Plan rendering ----
const stepKey = (turn, num) => `${turn}:${num}`;
function clearPlan() {
  $("plan").innerHTML = "";
  for (const k in steps) delete steps[k];
  for (const k in turnGroups) delete turnGroups[k];
}
// One collapsible group per turn (each user query = a new turn/chat).
function turnGroup(turn) {
  let g = turnGroups[turn];
  if (!g) {
    g = document.createElement("div");
    g.className = "turn-group";
    g.innerHTML = `<div class="turn-label">Chat ${turn}</div>`;
    $("plan").appendChild(g);
    turnGroups[turn] = g;
  }
  return g;
}
function renderPlan(list, turn, append) {
  if (!append) clearPlan();
  for (const s of list) addStep(turn, s.step_number, s.title, s.depends_on, s.status, s.result);
}
function addStep(turn, num, title, deps, status, result) {
  const key = stepKey(turn, num);
  let s = steps[key];
  if (!s) {
    const el = document.createElement("div");
    el.className = "step";
    const depTxt = deps && deps.length ? ` · needs ${deps.join(", ")}` : "";
    el.innerHTML = `<div class="head"><span class="badge">pending</span>
      <strong>Step ${num}</strong><span class="deps">${title}${depTxt}</span></div>
      <div class="result"></div>`;
    turnGroup(turn).appendChild(el);
    s = steps[key] = { el, badge: el.querySelector(".badge"), result: el.querySelector(".result"), children: {} };
  }
  if (status) setBadge(turn, num, status);
  if (result) s.result.textContent = result;
}
function setBadge(turn, num, status) {
  const s = steps[stepKey(turn, num)]; if (!s) return;
  s.badge.className = "badge " + status; s.badge.textContent = status;
}
// A nested child sub-agent block (spawn_subagents fan-out) under a plan step.
function childBlock(turn, num, idx, title) {
  const s = steps[stepKey(turn, num)]; if (!s) return null;
  let c = s.children[idx];
  if (!c) {
    const el = document.createElement("div");
    el.className = "subagent";
    el.innerHTML = `<div class="sa-head"><span class="badge running">running</span>
      <span class="sa-title">🤖 ${title || ("sub-agent " + (idx + 1))}</span></div>
      <div class="sa-tools"></div><div class="sa-result"></div>`;
    s.el.appendChild(el);
    c = s.children[idx] = { el, badge: el.querySelector(".badge"),
      tools: el.querySelector(".sa-tools"), result: el.querySelector(".sa-result") };
  }
  if (title) c.el.querySelector(".sa-title").textContent = "🤖 " + title;
  return c;
}
// Apply a streamed/persisted event to the plan DOM (tool calls + nested child
// sub-agents). Shared by live streaming and openSession() replay so reopening a
// session rebuilds the same per-step detail, not just the log lines.
function replayPlanEvent(type, d) {
  d = d || {}; const turn = d.turn || 1;
  if (type === "tool") {
    // Full result, no truncation. Build via textContent (not innerHTML) so
    // JSON/HTML in the summary is shown literally, not interpreted, and wraps.
    const t = document.createElement("div"); t.className = "tool";
    const code = document.createElement("code"); code.textContent = d.tool || "";
    t.appendChild(code);
    t.appendChild(document.createTextNode(" → " + (d.result_summary || "")));
    if (d.child_index !== undefined) {
      const c = childBlock(turn, d.step_number, d.child_index, d.child_title);
      if (c) c.tools.appendChild(t);
    } else {
      const s = steps[stepKey(turn, d.step_number)];
      if (s) s.el.appendChild(t);
    }
  } else if (type === "subagent_started") {
    childBlock(turn, d.step_number, d.child_index, d.child_title);
  } else if (type === "subagent_completed") {
    const c = childBlock(turn, d.step_number, d.child_index, d.child_title);
    if (c) {
      c.badge.className = "badge " + (d.status || "done");
      c.badge.textContent = d.status || "done";
      c.result.textContent = d.result || "";  // full child result, no cut
    }
  }
}

// ---- Sessions ----
async function loadSessions() {
  const r = await fetch("/sessions?page_size=100");
  const data = (await r.json()).data;
  $("sessions").innerHTML = "";
  for (const s of data.items) {
    sessionsById[s.id] = s;
    const el = document.createElement("div");
    el.className = "sess" + (s.id === sessionId ? " active" : "");
    el.innerHTML = `<div class="sess-main">${s.title || "Untitled"}<small>${fmtDateTime(s.created_at)}</small><small>tokens in/out: ${fmtTokens(s.input_tokens_used)}/${fmtTokens(s.output_tokens_used)}</small></div>
      <button class="sess-del" title="Delete chat">🗑</button>`;
    const mainEl = el.querySelector(".sess-main");
    mainEl.title = s.title || "Untitled";
    mainEl.onclick = () => openSession(s.id);
    el.querySelector(".sess-del").onclick = (e) => { e.stopPropagation(); deleteSession(s.id, s.title); };
    $("sessions").appendChild(el);
  }
}

async function openSession(id) {
  sessionId = id;
  $("thread").innerHTML = ""; $("log").innerHTML = ""; clearPlan();
  setStatus("loaded");
  const msgs = (await (await fetch(`/sessions/${id}/messages?page_size=200`)).json()).data.items;
  for (const m of msgs) {
    if (m.role === "user") addBubble("You", m.content.replace(/^\[revise\] /, "↻ "), "user");
    else if (m.role === "assistant") addBubble("Assistant", m.content, "assistant", true);
  }
  const arts = (await (await fetch(`/sessions/${id}/artifacts`)).json()).data;
  renderFiles(arts, id);
  const uploads = arts.filter((a) => a.kind === "upload");
  if (uploads.length) {
    const names = uploads.map((a) => a.name).join(", ");
    log(`📎 ${uploads.length} attached file(s): ${names}`);
  }
  const plan = (await (await fetch(`/sessions/${id}/plan`)).json()).data;
  // Nodes span every turn; render each under its own "Chat N" group.
  clearPlan();
  for (const n of plan) addStep(n.turn, n.step_number, n.title, n.depends_on, n.status, n.result);
  // Replay the persisted activity trace: rebuild per-step tool calls and nested
  // child sub-agent blocks in the plan, and log each line (oldest first).
  const evs = (await (await fetch(`/sessions/${id}/events`)).json()).data;
  for (const e of evs) { replayPlanEvent(e.type, e.data); log(eventLine(e.type, e.data)); }
  await loadSessions();
  syncChoice(sessionsById[id]);  // reflect this session's model/thinking
}

// ---- Export ----
function downloadText(filename, text) {
  const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
// Trigger a browser download for a URL (used to pull each attached file).
function triggerDownload(href, filename) {
  const a = document.createElement("a");
  a.href = href; a.download = filename || ""; a.rel = "noopener";
  document.body.appendChild(a); a.click(); a.remove();
}
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function slug(s) { return (s || "chat").replace(/[^\w]+/g, "_").replace(/^_|_$/g, "").slice(0, 40) || "chat"; }

// Page through every message so exports aren't capped at one page (le=200 on the API).
async function fetchAllMessages(id) {
  const pageSize = 200;
  const all = [];
  for (let page = 1; ; page++) {
    const { items } = (await (await fetch(
      `/sessions/${id}/messages?page=${page}&page_size=${pageSize}`)).json()).data;
    all.push(...items);
    if (items.length < pageSize) break;
  }
  return all;
}

async function exportChat(detailed) {
  if (!sessionId) { alert("Open or start a chat first."); return; }
  const sess = sessionsById[sessionId] || {};
  const title = sess.title || "Chat";
  const msgs = await fetchAllMessages(sessionId);

  const out = [`# ${title}`, ""];
  if (detailed) {
    out.push(
      `- **Model:** ${sess.model || "?"}`,
      `- **Thinking:** ${sess.thinking_level || "?"}`,
      `- **Exported:** ${new Date().toLocaleString()}`,
      "");
    const arts = (await (await fetch(`/sessions/${sessionId}/artifacts`)).json()).data;
    const uploads = arts.filter((a) => a.kind === "upload");
    if (uploads.length) {
      out.push("## Attached files", "",
        ...uploads.map((a) => `- **${a.name}** — ${a.summary || ""}`), "");
    }
  }

  // Conversation (request + response) — both exports include this.
  out.push("## Conversation", "");
  for (const m of msgs) {
    if (m.role === "user") out.push("### 🧑 You", "", m.content.replace(/^\[revise\] /, "↻ Revised: "), "");
    else if (m.role === "assistant") out.push("### 🤖 Assistant", "", m.content, "");
  }

  if (detailed) {
    const plan = (await (await fetch(`/sessions/${sessionId}/plan`)).json()).data;
    if (plan.length) {
      out.push("---", "", "## 🧩 Research plan & steps", "");
      let curTurn = null;
      for (const n of plan) {
        if (n.turn !== curTurn) { curTurn = n.turn; out.push(`### Chat ${curTurn}`, ""); }
        const deps = n.depends_on && n.depends_on.length ? ` · depends on ${n.depends_on.join(", ")}` : "";
        out.push(`#### Step ${n.step_number}: ${n.title} — _${n.status}_${deps}`, "");
        if (n.description) out.push(`> ${n.description}`, "");
        if (n.result) out.push(n.result, "");
      }
    }
    // Persisted activity trace (tools, reflections, evaluator) — oldest first.
    const evs = (await (await fetch(`/sessions/${sessionId}/events`)).json()).data;
    const activity = evs.map((e) => eventLine(e.type, e.data));
    if (activity.length) {
      out.push("---", "", "## 🛠 Activity trace", "", "```", ...activity, "```", "");
    }
  }

  downloadText(`${detailed ? "full" : "chat"}-${slug(title)}.md`, out.join("\n"));
}

async function deleteSession(id, title) {
  if (!confirm(`Delete chat "${title || "Untitled"}"? This cannot be undone.`)) return;
  await fetch(`/sessions/${id}`, { method: "DELETE" }).catch(() => {});
  delete sessionsById[id];
  if (id === sessionId) await newChat();
  else await loadSessions();
}

async function newChat() {
  sessionId = null;
  $("thread").innerHTML = ""; $("log").innerHTML = ""; clearPlan(); renderFiles([], null);
  setStatus("new");
  await loadSessions();
  $("q").focus();
}

// ---- File / image uploads ----
async function uploadFiles(files) {
  if (!files.length) return;
  if (!sessionId) sessionId = await createSession(files[0].name);
  $("attach").classList.add("busy");
  for (const f of files) {
    const fd = new FormData();
    fd.append("file", f);
    try {
      const r = await fetch(`/sessions/${sessionId}/files`, { method: "POST", body: fd });
      if (!r.ok) throw new Error(await r.text());
      const a = (await r.json()).data;
      addBubble("You", `📎 ${a.name}${a.summary ? " — " + a.summary : ""}`, "user");
      log(`📎 uploaded ${a.name}`);
    } catch (e) {
      addBubble("Error", `Upload failed for ${f.name}`, "assistant");
    }
  }
  $("attach").classList.remove("busy");
  setStatus("file ready — ask about it");
  await loadFiles(sessionId);
  showTab("files");  // surface the just-uploaded file
  await loadSessions();
}

async function createSession(title) {
  const r = await fetch("/sessions", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({title: title.slice(0, 80), ...currentChoice()})
  });
  return (await r.json()).data.id;
}

// ---- Run / continue ----
async function streamRequest(url, body) {
  $("run").disabled = true; $("stop").disabled = false;
  const resp = await fetch(url, {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const {value, done} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream: true});
    const frames = buf.split("\n\n");
    buf = frames.pop();
    for (const frame of frames) {
      const line = frame.split("\n").find(l => l.startsWith("data: "));
      if (line) handle(JSON.parse(line.slice(6)));
    }
  }
  $("run").disabled = false; $("stop").disabled = true;
  await loadSessions();
}

async function run() {
  const query = $("q").value.trim();
  if (!query) return;
  $("q").value = ""; autoGrow();
  // Keep prior turns' plan & activity for full traceability — this turn appends
  // its own "Chat N" plan group; a divider marks the new turn in the log.
  if ($("log").childNodes.length) log("──────── new query ────────");
  streamBubble = null;
  addBubble("You", query, "user");
  showTab("plan");  // focus the plan as this turn's steps come in
  setStatus("planning…");
  if (!sessionId) sessionId = await createSession(query);
  await streamRequest(
    `/sessions/${sessionId}/research/stream`, {query, ...currentChoice()}
  );
}

function handle(ev) {
  switch (ev.type) {
    case "plan_created":
      setStatus("executing…");
      // Upsert into this turn's group (never clears prior turns); a revision
      // adds its new steps alongside the kept ones already shown.
      renderPlan(ev.steps, ev.turn || 1, true);
      if (ev.revised) log(`↻ revised — kept: ${(ev.kept || []).join(", ") || "none"}`);
      break;
    case "node_started":
      setBadge(ev.turn || 1, ev.step_number, "running");
      log(`▶ step ${ev.step_number} started`); break;
    case "tool":
      replayPlanEvent("tool", ev); log(eventLine("tool", ev)); break;
    case "subagents_spawned":
      setStatus("fanning out…"); log(eventLine("subagents_spawned", ev)); break;
    case "subagent_started":
      replayPlanEvent("subagent_started", ev); log(eventLine("subagent_started", ev)); break;
    case "subagent_completed":
      replayPlanEvent("subagent_completed", ev); log(eventLine("subagent_completed", ev)); break;
    case "node_completed": {
      setBadge(ev.turn || 1, ev.step_number, ev.status);
      const s = steps[stepKey(ev.turn || 1, ev.step_number)];
      if (s) s.result.textContent = ev.result || "";
      log(`✔ step ${ev.step_number} ${ev.status}`); break;
    }
    case "reflection":
      log(`🔎 step ${ev.step_number} self-review: ${ev.sufficient ? "sufficient" : "gathering more"} — ${ev.reason}`); break;
    case "evaluator":
      log(`↻ evaluator: ${ev.done ? "done" : "needs more"} — ${ev.reason}`); break;
    case "stopped":
      setStatus("stopping…"); log(`⏹ ${ev.reason}`); break;
    case "budget_exceeded":
      setStatus("budget…"); log(`💰 ${ev.reason}`); break;
    case "no_progress":
      log(`⚠ ${ev.reason}`); break;
    case "answer_part":
      // A long answer exceeded one model call's output cap and is being
      // continued in another streamed part, concatenated into the same bubble.
      setStatus(`writing part ${ev.part}…`);
      log(`✍ answer continued — part ${ev.part}`); break;
    case "answer_delta": {
      if (!streamBubble) { streamBubble = addBubble("Assistant", "", "assistant"); streamBubble._raw = ""; }
      streamBubble._raw += ev.text;
      renderMarkdown(bubbleBody(streamBubble), streamBubble._raw);
      scrollThread(); break;
    }
    case "answer": {
      setStatus(ev.stopped ? "stopped" : "done");
      // Reuse the streamed bubble if we built one; otherwise render in full.
      const b = streamBubble || addBubble("Assistant", "", "assistant");
      const body = bubbleBody(b);
      renderMarkdown(body, ev.answer);
      renderMermaid(body);  // diagrams only render once the full answer is in
      const st = document.createElement("div"); st.className = "stats";
      st.textContent = `time: ${fmtDuration(ev.elapsed_seconds)} · iterations: ${ev.iterations} · tokens in/out: ${ev.input_tokens}/${ev.output_tokens}`;
      b.appendChild(st); streamBubble = null; scrollThread();
      loadFiles(sessionId);  // surface any files the run downloaded/parsed
      break;
    }
    case "error":
      setStatus("error"); addBubble("Error", ev.message, "assistant"); break;
  }
}

async function stop() {
  if (!sessionId) return;
  $("stop").disabled = true;
  await fetch(`/sessions/${sessionId}/stop`, {method: "POST"});
  log("⏹ stop requested");
}

// Right-panel tabs: Plan / Activity / Files — only the focused view is shown.
const TABS = [...document.querySelectorAll(".tab")];
function showTab(name) {
  for (const t of TABS) t.classList.toggle("active", t.dataset.tab === name);
  for (const t of TABS) $(t.dataset.tab).hidden = t.dataset.tab !== name;
}
for (const t of TABS) t.addEventListener("click", () => showTab(t.dataset.tab));

$("file").addEventListener("change", (e) => {
  uploadFiles([...e.target.files]); e.target.value = "";
});
$("exportMd").addEventListener("click", () => exportChat(false));
$("exportFull").addEventListener("click", () => exportChat(true));
$("run").addEventListener("click", run);
$("stop").addEventListener("click", stop);
$("new").addEventListener("click", newChat);
// Auto-grow the composer with its content, up to the CSS max-height.
function autoGrow() {
  const t = $("q");
  t.style.height = "auto";
  t.style.height = Math.min(t.scrollHeight, 200) + "px";
}
$("q").addEventListener("input", autoGrow);
$("q").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); run(); }
});
// When the model/thinking dropdown changes on an existing session, persist it
// so a mid-session switch sticks (the next request carries the new choice).
for (const id of ["model", "thinking"]) {
  $(id).addEventListener("change", async () => {
    if (!sessionId) return;
    await fetch(`/sessions/${sessionId}/settings`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify(currentChoice())
    }).catch(() => {});
    if (sessionsById[sessionId]) Object.assign(sessionsById[sessionId], currentChoice());
  });
}
loadModelOptions();
loadSessions();
</script>
